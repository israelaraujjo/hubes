version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hubes
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ../backend
    command: pnpm run start:dev
    volumes:
      - ../backend:/usr/src/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hubes?schema=public
      JWT_SECRET: super-secret-key
    ports:
      - '3333:3333'
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    volumes:
      - ../frontend:/usr/src/app
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  db-data:
